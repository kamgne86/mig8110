<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Détail produit</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="page">
    <div class="detail-panel panel">
      <div class="detail-header panel-header">
        <a href="/static/index.html" class="back-arrow">←</a>
        <h1 id="name">Chargement…</h1>
      </div>

      <div class="detail-body panel-body">
        <p class="detail-meta">
          <strong id="brand">—</strong>
          <span> | </span>
          <span id="category">—</span>
        </p>

        <div class="scores-row">
          <div class="score-line">
            <span class="nutri-label">Nutri-Score</span>
            <span class="nutri-score" id="nutriScore">—</span>
          </div>
          <div class="score-line">
            <span class="nutri-label eco">Éco-Score</span>
            <span class="nutri-score eco" id="ecoScore">—</span>
          </div>
        </div>

        <div class="separator"></div>

        <h3 class="detail-section-title">Infos Nutritionnelles (pour 100g)</h3>
        <ul class="nutrition-details">
          <li><i data-lucide="flame"         class="nutri-icon"></i> Calories : <span id="calories">—</span></li>
          <li><i data-lucide="candy"          class="nutri-icon"></i> Sucres : <span id="sugars">—</span></li>
          <li><i data-lucide="circle-dot"     class="nutri-icon"></i> Sel : <span id="salt">—</span></li>
          <li><i data-lucide="droplets"       class="nutri-icon"></i> Lipides : <span id="fat">—</span></li>
          <li><i data-lucide="activity"       class="nutri-icon"></i> Acides gras saturés : <span id="saturated">—</span></li>
          <li><i data-lucide="dumbbell"       class="nutri-icon"></i> Protéines : <span id="proteins">—</span></li>
          <li><i data-lucide="wheat"          class="nutri-icon"></i> Glucides : <span id="carbs">—</span></li>
          <li><i data-lucide="leaf"           class="nutri-icon"></i> Fibres : <span id="fiber">—</span></li>
        </ul>

        <div class="separator"></div>

        <h3 class="detail-section-title">Ingrédients</h3>
        <div class="ingredients-row">
          <div class="ingredients-text" id="ingredients">—</div>
          <div class="detail-image-box" id="imageBox">
            <span>IMAGE</span>
          </div>
        </div>

        <div id="rawJsonSection" style="display:none; margin-top:20px;">
          <div class="separator"></div>
          <h3 class="detail-section-title">
            <button class="small-btn" onclick="toggleRaw()">Voir données brutes ▼</button>
          </h3>
          <pre id="rawJson" style="display:none; background:#f8fafc; padding:14px; border-radius:8px; overflow:auto; font-size:12px; color:#475467;"></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/utils.js"></script>
  <script>
    const API_BASE = '';  // même origine que le backend FastAPI

    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      if (!code) {
        document.getElementById('name').textContent = 'Code produit manquant';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/products/${code}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const p = await res.json();
        fillFromProduct(p);
      } catch (e) {
        document.getElementById('name').textContent = 'Erreur de chargement';
        console.error(e);
      }
    }

    function val(v, unit = '', decimals = 2) {
      if (v === null || v === undefined || v === '') return '—';
      return (Math.round(v * 100) / 100).toFixed(decimals) + (unit ? ' ' + unit : '');
    }

    // validGrade() et parseTags() sont définis dans utils.js

    function fillFromProduct(p) {
      document.title = p.product_name || 'Détail produit';
      document.getElementById('name').textContent  = p.product_name || 'Sans nom';
      document.getElementById('brand').textContent = p.brands || '—';

      // categories_tags : "['en:sweeteners', 'en:syrups']" → on prend les 3 premières
      document.getElementById('category').textContent = parseTags(p.categories_tags, 3).join(', ') || '—';

      // Nutri-Score
      const nsGrade = validGrade(p.nutriscore_grade);
      const ns = document.getElementById('nutriScore');
      ns.textContent = nsGrade ? nsGrade.toUpperCase() : '—';
      ns.className   = nsGrade ? `nutri-score ns-${nsGrade}` : 'nutri-score';

      // Éco-Score
      const esGrade = validGrade(p.ecoscore_grade);
      const es = document.getElementById('ecoScore');
      es.textContent = esGrade ? esGrade.toUpperCase() : '—';
      es.className   = esGrade ? `nutri-score eco es-${esGrade}` : 'nutri-score eco';

      document.getElementById('calories').textContent  = val(p.energy_kcal_100g, 'kcal', 0);
      document.getElementById('sugars').textContent    = val(p.sugars_100g, 'g');
      document.getElementById('salt').textContent      = val(p.salt_100g, 'g');
      document.getElementById('fat').textContent       = val(p.fat_100g, 'g');
      document.getElementById('saturated').textContent = val(p.saturated_fat_100g, 'g');
      document.getElementById('proteins').textContent  = val(p.proteins_100g, 'g');
      document.getElementById('carbs').textContent     = val(p.carbohydrates_100g, 'g');
      document.getElementById('fiber').textContent     = val(p.fiber_100g, 'g');

      // Ingrédients : pas de champ texte libre → on parse ingredients_tags
      document.getElementById('ingredients').textContent = parseTags(p.ingredients_tags).join(', ') || '—';

      if (p.front_url) {
        const box = document.getElementById('imageBox');
        const img = document.createElement('img');
        img.src = p.front_url;
        img.alt = 'Photo produit';
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:12px;';
        box.replaceChildren(img);
      }

      // Données brutes
      document.getElementById('rawJsonSection').style.display = 'block';
      document.getElementById('rawJson').textContent = JSON.stringify(p, null, 2);
    }

    function toggleRaw() {
      const pre = document.getElementById('rawJson');
      pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
    }

    loadProduct().then(() => lucide.createIcons());
  </script>
</body>
</html>
